<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiva Fm - Secure Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-[#002e6e] p-8 text-center relative">
            <div class="absolute top-4 right-4 bg-green-400 w-3 h-3 rounded-full animate-ping"></div>
            <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <img src="https://p7.hiclipart.com/preview/203/732/665/paytm-e-commerce-payment-system-bank-business-bank.jpg" class="w-12 h-12">
            </div>
            <h1 class="text-white font-bold text-lg flex items-center justify-center gap-1">
                Audiva Fm Private Ltd
                <span class="text-blue-400">●</span>
            </h1>
            <p class="text-blue-200 text-xs font-mono">paytm.s1h4uwq@pty</p>
        </div>

        <div class="p-8">
            <div class="text-center mb-8">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Amount Payable</p>
                <h2 class="text-5xl font-black text-gray-900 mt-2">₹1.00</h2>
            </div>

            <button onclick="launchApp()" class="w-full py-4 bg-[#002e6e] text-white rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all mb-4">
                Proceed Securely
            </button>

            <button onclick="downloadQR()" class="w-full py-3 bg-gray-100 text-gray-600 rounded-2xl font-semibold text-sm border border-gray-200 active:scale-95 transition-all">
                Save QR to Gallery
            </button>

            <div class="mt-8 text-center">
                <div class="inline-block p-4 bg-white rounded-3xl border-2 border-dashed border-gray-200">
                    <img id="final-qr" src="" class="w-40 h-40">
                </div>
                <p class="text-[10px] text-gray-400 mt-4 leading-relaxed">
                    If "Proceed" gives a risk error: <br>
                    <strong>1. Save QR</strong> → <strong>2. Open Paytm</strong> → <strong>3. Scan from Gallery</strong>
                </p>
            </div>
        </div>
    </div>

    <script>
        const VPA = "paytm.s1h4uwq@pty";
        const NAME = "Audiva Fm Private Limited";
        // Unique ID for every refresh
        const TR = "AUD" + Math.floor(Math.random() * 1000000000);

        // The "Scan-Style" Intent (Bypasses most browser blocks)
        const intent = `upi://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=1.00&cu=INR&mc=5732&tr=${TR}&mode=02&orgid=189999`;

        // Set QR
        const qrImg = document.getElementById('final-qr');
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(intent)}`;
        qrImg.src = qrUrl;

        function launchApp() {
            // Force the universal intent (This triggers the OS App Picker)
            window.location.href = intent;
        }

        function downloadQR() {
            // Opens QR in new tab for easy saving
            window.open(qrUrl, '_blank');
            alert("QR Opened! Save it and scan inside your UPI app to complete payment.");
        }
    </script>
</body>
</html>
