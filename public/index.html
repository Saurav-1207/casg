<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Secure Intent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        .gradient-btn { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-6 text-center text-white">
            <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest">Safe Payment Gateway</p>
            <h2 class="text-3xl font-extrabold mt-2">₹1.00</h2>
        </div>

        <div class="p-8">
            <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-100">
                <div>
                    <p class="text-gray-400 text-xs font-bold uppercase">Merchant</p>
                    <p class="text-gray-800 font-bold">Secure Services Ltd</p>
                </div>
                <div class="text-right">
                    <p class="text-gray-400 text-xs font-bold uppercase">Ref ID</p>
                    <p id="ref-display" class="text-gray-800 font-mono text-sm font-bold">--------</p>
                </div>
            </div>

            <div class="grid gap-4">
                <button onclick="triggerPay('phonepe')" class="flex items-center justify-between w-full p-4 bg-[#5f259f] text-white rounded-2xl font-bold transition active:scale-95 shadow-lg shadow-purple-200">
                    <span>PhonePe</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>

                <button onclick="triggerPay('paytm')" class="flex items-center justify-between w-full p-4 bg-[#00baf2] text-white rounded-2xl font-bold transition active:scale-95 shadow-lg shadow-blue-200">
                    <span>Paytm App</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>

                <button onclick="triggerPay('gpay')" class="flex items-center justify-between w-full p-4 bg-white border-2 border-gray-200 text-gray-700 rounded-2xl font-bold transition active:scale-95">
                    <span>Google Pay</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>

            <div class="mt-8 text-center">
                <p class="text-gray-400 text-[10px] font-bold uppercase mb-4 tracking-widest">Or scan this QR</p>
                <div class="inline-block p-4 bg-gray-50 rounded-3xl border border-gray-100 shadow-inner">
                    <img id="fallback-qr" src="" class="w-32 h-32 opacity-80" alt="QR Code">
                </div>
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 text-center">
            <p class="text-[10px] text-gray-400 font-medium">Session expires in 5:00 minutes</p>
        </div>
    </div>

    <script>
        // Use your VPA from the image
        const VPA = "paytm.s1h4uwq@pty";
        const NAME = "Secure Merchant";

        // Generate a 12-digit numeric Ref ID on page load (Bypasses REF_ID_INVALID)
        const tr = Math.floor(100000000000 + Math.random() * 900000000000).toString();
        document.getElementById('ref-display').innerText = tr.substring(0, 8);

        // Generate Fallback QR immediately
        const qrData = `upi://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=1.00&cu=INR&tr=${tr}&mode=02`;
        document.getElementById('fallback-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;

        async function triggerPay(app) {
            let intent = "";
            const am = "1.00";
            
            if (app === 'phonepe') {
                // purpose=11 marks it as a Goods/Services payment (High Trust)
                intent = `phonepe://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${am}&tr=${tr}&mc=5411&cu=INR&mode=02&purpose=11`;
            } 
            else if (app === 'paytm') {
                // Minimal params to bypass Paytm Risk Policy
                intent = `paytmmp://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${am}&tr=${tr}&cu=INR`;
            } 
            else if (app === 'gpay') {
                intent = `tez://upi/pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${am}&tr=${tr}&mc=5411&cu=INR`;
            }

            // Small delay to ensure browser handles the redirect properly
            setTimeout(() => {
                window.location.href = intent;
            }, 50);
        }
    </script>
</body>
</html>
