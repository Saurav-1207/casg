<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure UPI Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <span class="bg-green-100 text-green-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Verified Merchant</span>
            <span class="text-gray-400 text-[10px] font-mono" id="txn-id">TRX...</span>
        </div>

        <div class="text-center mb-8">
            <p class="text-gray-500 text-sm font-medium">Payable Amount</p>
            <h1 class="text-4xl font-black text-slate-900">₹1.00</h1>
        </div>

        <div class="bg-slate-50 rounded-3xl p-4 mb-6 border border-slate-100 flex flex-col items-center">
            <div id="qr-container" class="bg-white p-2 rounded-xl shadow-sm mb-3">
                <img id="main-qr" src="" class="w-40 h-40">
            </div>
            <p class="text-[10px] text-slate-400 font-medium">Screenshot & Scan if buttons fail</p>
        </div>

        <div class="space-y-3" id="action-area">
            <button onclick="openApp('phonepe')" class="w-full py-4 bg-[#5f259f] text-white rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition">
                Open PhonePe
            </button>
            <button onclick="openApp('paytm')" class="w-full py-4 bg-[#00baf2] text-white rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition">
                Open Paytm
            </button>
        </div>

        <p class="text-center text-[10px] text-slate-300 mt-6 uppercase tracking-widest font-bold">Secure Encrypted Session</p>
    </div>

    <script>
        // DATA CONFIG
        const VPA = "paytm.s1h4uwq@pty";
        const NAME = "Order_Payment";
        const AMOUNT = "1.00";
        
        // Generate a clean 12-digit numeric ID for Paytm compatibility
        const TR = Math.floor(100000000000 + Math.random() * 900000000000).toString();
        document.getElementById('txn-id').innerText = "TXN" + TR.substring(8);

        // Standard UPI String
        const upiString = `upi://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${AMOUNT}&cu=INR&tr=${TR}`;

        // 1. SET QR CODE (The ultimate backup)
        document.getElementById('main-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiString + "&mode=02")}`;

        // 2. APP REDIRECT LOGIC
        function openApp(app) {
            let intent = "";
            
            // We use the most basic intent possible. 
            // Over-complicating it with mc/purpose codes on personal VPAs triggers the risk policy.
            if (app === 'phonepe') {
                intent = `phonepe://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${AMOUNT}&tr=${TR}&cu=INR`;
            } else if (app === 'paytm') {
                intent = `paytmmp://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${AMOUNT}&tr=${TR}&cu=INR`;
            }

            // The Bypass Trick: Launching via a user-initiated timeout
            const start = Date.now();
            window.location.href = intent;

            // If the app doesn't open within 2 seconds, nudge the user to use the QR
            setTimeout(() => {
                if (Date.now() - start < 2500) {
                    alert("If the app didn't open or showed a Risk error, please Screenshot the QR code and scan it inside your UPI app.");
                }
            }, 2000);
        }
    </script>
</body>
</html>
