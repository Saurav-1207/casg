<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2f4f7] flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-[2rem] shadow-xl p-8 border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-gray-800">Secure Pay</h1>
            <p class="text-gray-400 text-sm font-medium">Verify & Pay</p>
        </div>

        <div class="bg-indigo-50 rounded-2xl p-6 mb-8 text-center border border-indigo-100">
            <span class="text-indigo-600 text-4xl font-black">₹1.00</span>
        </div>

        <div class="space-y-4">
            <a id="pay-button" href="javascript:void(0)" onclick="handlePayment()" class="flex items-center justify-center w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-transform">
                CLICK TO PAY
            </a>
            
            <p class="text-center text-[11px] text-gray-400 leading-relaxed uppercase tracking-tighter">
                Clicking will open your UPI apps.<br>If blocked, use the QR below.
            </p>
        </div>

        <div class="mt-8 pt-8 border-t border-dashed border-gray-200 text-center">
            <div class="inline-block p-3 bg-white rounded-2xl border border-gray-100 shadow-sm">
                <img id="qr-code" src="" class="w-36 h-36 mx-auto">
            </div>
            <p class="text-[10px] text-gray-400 mt-2">Long press to download QR</p>
        </div>
    </div>

    <script>
        // Use a 12-digit numeric Ref ID (The UTR format banks trust)
        const TR = Math.floor(100000000000 + Math.random() * 900000000000).toString();
        const VPA = "paytm.s1h4uwq@pty";
        const NAME = "Web_Payment";
        
        // Construct the intent URL
        // We REMOVE 'mc' and 'mode' because on personal VPAs they trigger RISK POLICY
        const upiUrl = `upi://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=1.00&cu=INR&tr=${TR}`;

        // Set QR source
        document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUrl)}`;

        function handlePayment() {
            // First attempt: General UPI intent (Shows the App Picker)
            // This is the "Friend's way" - it lets the OS handle the risk, not the browser
            window.location.href = upiUrl;

            // Second attempt: Fallback after 1 second if app doesn't open
            setTimeout(() => {
                window.location.href = `paytmmp://pay?pa=${VPA}&pn=${encodeURIComponent(NAME)}&am=1.00&cu=INR&tr=${TR}`;
            }, 1500);
        }
    </script>
</body>
</html>
